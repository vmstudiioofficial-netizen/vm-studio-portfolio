<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Short Videos | VM Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #050505;
        --accent-color: #facc15;
        --text-primary: #ffffff;
        --text-secondary: #a3a3a3;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glow-color: rgba(250, 204, 21, 0.15);
        --purple-glow: rgba(139, 92, 246, 0.15);
        --blue-glow: rgba(59, 130, 246, 0.15);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: radial-gradient(circle at 50% 50%, #0d0d1a, #050505);
        background-attachment: fixed;
        color: var(--text-primary);
        font-family: 'Poppins', sans-serif;
        overflow-x: hidden;
        position: relative;
      }

      /* Animated Background */
      .bg-glow-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
        background: radial-gradient(circle at center, rgba(13, 13, 26, 1) 0%, rgba(5, 5, 5, 1) 100%);
      }

      .glow-ball {
        position: absolute;
        border-radius: 50%;
        filter: blur(150px);
        opacity: 0.5;
        animation: floatMove 25s infinite alternate ease-in-out;
      }

      .glow-yellow {
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
        top: -150px;
        left: -100px;
      }

      .glow-purple {
        width: 700px;
        height: 700px;
        background: radial-gradient(circle, var(--purple-glow) 0%, transparent 70%);
        bottom: -200px;
        right: -150px;
        animation-duration: 30s;
        animation-delay: -5s;
      }

      .glow-blue {
        width: 550px;
        height: 550px;
        background: radial-gradient(circle, var(--blue-glow) 0%, transparent 70%);
        top: 40%;
        left: 45%;
        animation-duration: 22s;
        animation-delay: -10s;
      }

      @keyframes floatMove {
        0% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(50px, 100px) scale(1.1); }
        66% { transform: translate(-80px, 50px) scale(0.9); }
        100% { transform: translate(0, 0) scale(1); }
      }

      .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4rem;
        padding-top: 2rem;
      }

      .btn-back {
        padding: 0.75rem 1.5rem;
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: var(--text-primary);
        text-decoration: none;
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-back:hover {
        background: var(--accent-color);
        color: #000;
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(250, 204, 21, 0.3);
      }

      h1 { font-family: 'Montserrat', sans-serif; font-size: 2.5rem; }

      .video-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 3rem;
        padding-bottom: 4rem;
      }

      .video-item {
        aspect-ratio: 9/16;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        position: relative;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      }

      .video-item iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      .video-item:hover {
        transform: translateY(-15px) scale(1.02);
        border-color: var(--accent-color);
        box-shadow: 0 20px 50px rgba(250, 204, 21, 0.15);
      }

      @media (max-width: 768px) {
        .video-grid {
          grid-template-columns: 1fr;
          max-width: 400px;
          margin: 0 auto;
        }
      }

      .video-placeholder {
        color: var(--text-secondary);
        font-size: 0.9rem;
        text-align: center;
        padding: 1rem;
      }

      .fade-in { animation: fadeIn 1s ease-out forwards; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="bg-glow-container">
      <div class="glow-ball glow-yellow"></div>
      <div class="glow-ball glow-purple"></div>
      <div class="glow-ball glow-blue"></div>
    </div>

    <div class="container fade-in">
      <header class="header">
        <h1>Short <span style="color:var(--accent-color)">Videos</span></h1>
        <a href="index.html#work" class="btn-back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to My Work
        </a>
      </header>

      <div class="video-grid">
        <div class="video-item">
          <iframe id="video1" src="https://www.youtube.com/embed/iDIHqF6Q_5Q?enablejsapi=1" title="Short Video 1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="video-item">
          <iframe id="video2" src="https://www.youtube.com/embed/Ob440HNDSSg?enablejsapi=1" title="Short Video 2" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="video-item">
          <iframe id="video3" src="https://www.youtube.com/embed/1SykGqEN40o?enablejsapi=1" title="Short Video 3" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="video-item">
          <iframe id="video4" src="https://www.youtube.com/embed/h_c8umfwUCo?enablejsapi=1" title="Short Video 4" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="video-item">
          <iframe id="video5" src="https://www.youtube.com/embed/MBfWOZr_pgQ?enablejsapi=1" title="Short Video 5" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="video-item">
          <iframe id="video6" src="https://www.youtube.com/embed/z2fFDp0sQ44?enablejsapi=1" title="Short Video 6" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
      let players = [];
      function onYouTubeIframeAPIReady() {
        const iframes = document.querySelectorAll('iframe');
        iframes.forEach((iframe, index) => {
          players.push(new YT.Player(iframe.id, {
            events: {
              'onStateChange': (event) => onPlayerStateChange(event, index)
            }
          }));
        });
      }

      function onPlayerStateChange(event, currentIndex) {
        // YT.PlayerState.PLAYING is 1
        if (event.data === 1) {
          players.forEach((player, index) => {
            if (index !== currentIndex && player.getPlayerState() === 1) {
              player.pauseVideo();
            }
          });
        }
      }
    </script>
  </body>
</html>
