<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Manipulation | VM Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #050505;
        --accent-color: #facc15;
        --text-primary: #ffffff;
        --text-secondary: #a3a3a3;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glow-color: rgba(250, 204, 21, 0.15);
        --purple-glow: rgba(139, 92, 246, 0.15);
        --blue-glow: rgba(59, 130, 246, 0.15);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: radial-gradient(circle at 50% 50%, #0d0d1a, #050505);
        background-attachment: fixed;
        color: var(--text-primary);
        font-family: 'Poppins', sans-serif;
        overflow-x: hidden;
        position: relative;
      }

      /* Animated Background */
      .bg-glow-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
        background: radial-gradient(circle at center, rgba(13, 13, 26, 1) 0%, rgba(5, 5, 5, 1) 100%);
      }

      .glow-ball {
        position: absolute;
        border-radius: 50%;
        filter: blur(150px);
        opacity: 0.5;
        animation: floatMove 25s infinite alternate ease-in-out;
      }

      .glow-yellow {
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
        top: -150px;
        left: -100px;
      }

      .glow-purple {
        width: 700px;
        height: 700px;
        background: radial-gradient(circle, var(--purple-glow) 0%, transparent 70%);
        bottom: -200px;
        right: -150px;
        animation-duration: 30s;
        animation-delay: -5s;
      }

      .glow-blue {
        width: 550px;
        height: 550px;
        background: radial-gradient(circle, var(--blue-glow) 0%, transparent 70%);
        top: 40%;
        left: 45%;
        animation-duration: 22s;
        animation-delay: -10s;
      }

      @keyframes floatMove {
        0% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(50px, 100px) scale(1.1); }
        66% { transform: translate(-80px, 50px) scale(0.9); }
        100% { transform: translate(0, 0) scale(1); }
      }

      .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4rem;
        padding-top: 2rem;
      }

      .btn-back {
        padding: 0.75rem 1.5rem;
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: var(--text-primary);
        text-decoration: none;
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-back:hover {
        background: var(--accent-color);
        color: #000;
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(250, 204, 21, 0.3);
      }

      h1 { font-family: 'Montserrat', sans-serif; font-size: 2.5rem; }

      .gallery {
        columns: 2 400px;
        column-gap: 2rem;
      }

      @media (max-width: 768px) { .gallery { columns: 1; } }

      .gallery-item {
        margin-bottom: 2rem;
        break-inside: avoid;
        border-radius: 20px;
        overflow: hidden;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
      }

      .gallery-item img {
        width: 100%;
        display: block;
        transition: transform 0.6s ease;
      }

      .gallery-item:hover {
        transform: translateY(-15px) scale(1.02);
        border-color: var(--accent-color);
        box-shadow: 0 15px 40px rgba(250, 204, 21, 0.3);
      }

      .gallery-item:hover img { transform: scale(1.05); }

      .float-up { animation: floatUp 8s infinite ease-in-out; }
      .float-down { animation: floatDown 8s infinite ease-in-out; }

      @keyframes floatUp {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
      }

      @keyframes floatDown {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(20px); }
      }

      .fade-in { animation: fadeIn 1s ease-out forwards; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="bg-glow-container">
      <div class="glow-ball glow-yellow"></div>
      <div class="glow-ball glow-purple"></div>
      <div class="glow-ball glow-blue"></div>
    </div>

    <div class="container fade-in">
      <header class="header">
        <h1>Product <span style="color:var(--accent-color)">Manipulation</span></h1>
        <a href="index.html#work" class="btn-back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to My Work
        </a>
      </header>

      <div class="gallery">
        <div class="gallery-item float-up">
          <img src="https://i.ibb.co/fYPFtLKr/From-Klick-Pin-CF-85-Cute-Healthy-Breakfast-Ideas-Pin-927460117015610807-1.jpg" alt="Healthy Breakfast Idea">
        </div>
        <div class="gallery-item float-down" style="animation-delay: -1s;">
          <img src="https://i.ibb.co/S49zsKjm/From-Klick-Pin-CF-Recreate-these-beautiful-ways-to-style-your-digital-planning-that-look-high-end-bu.jpg" alt="Digital Planning Style">
        </div>
        <div class="gallery-item float-up" style="animation-delay: -2s;">
          <img src="https://i.ibb.co/k2xCWNdz/From-Klick-Pin-CF-Explore-Simple-healthy-breakfast-recipes-that-make-your-next-project-look-polished.jpg" alt="Polished Breakfast Recipes">
        </div>
        <div class="gallery-item float-down" style="animation-delay: -3.5s;">
          <img src="https://i.ibb.co/yGFzqtG/From-Klick-Pin-CF-From-beginner-to-obsessed-Build-these-smart-bridesmaid-gift-ideas-that-look-high-e.jpg" alt="Smart Bridesmaid Gift Ideas">
        </div>
        <div class="gallery-item float-up" style="animation-delay: -5s;">
          <img src="https://i.ibb.co/ZpJ3TPJm/From-Klick-Pin-CF-Style-these-budget-friendly-ways-to-style-your-holiday-hosting-that-help-you-get-t.jpg" alt="Holiday Hosting Style">
        </div>
        <div class="gallery-item float-down" style="animation-delay: -6.5s;">
          <img src="https://i.ibb.co/hFNxNK0J/From-Klick-Pin-CF-Save-Must-save-clean-girl-makeup-looks-for-your-next-inspiration-board-with-enough.jpg" alt="Clean Girl Makeup Looks">
        </div>
      </div>
    </div>
  </body>
</html>
